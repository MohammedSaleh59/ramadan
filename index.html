<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c7b93">
<title>العد التنازلي لشهر رمضان ١٤٤٨هـ</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma, Arial;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
	 font-variant-numeric: arabic-indic;
    background:
    radial-gradient(circle at top, #1f3c88 0%, #0d1b2a 50%, #000 100%);
    color:white;
    padding:15px;
}

/* خلفية متحركة */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:
    repeating-radial-gradient(circle,
    rgba(255,255,255,0.05) 0 2px,
    transparent 2px 40px);
    animation:moveBg 30s linear infinite;
    pointer-events:none;
}

@keyframes moveBg{
    from{transform:translate(0,0);}
    to{transform:translate(-200px,-200px);}
}

.container{
    position:relative;
    z-index:2;
    text-align:center;
    width:100%;
    max-width:1100px;
}

h1{
    font-size:clamp(28px, 6vw, 55px);
    line-height:1.4;
    margin-bottom:12px;
    text-shadow:0 0 20px #00d9ff;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px #00d9ff; }
    to{ text-shadow:0 0 35px #00d9ff; }
}

.sub{
    font-size:clamp(16px, 3vw, 22px);
    line-height:1.7;
    margin-bottom:25px;
    color:#d0ecff;
}

.countdown{
    display:grid;

    /* على الجوال: مربعان في الصف */
    grid-template-columns:repeat(2, minmax(0, 1fr));

    justify-content:center;
    gap:12px;
    width:100%;
    max-width:800px;
    margin:auto;
}

.box{
    width:100%;
    height:auto;
    aspect-ratio:1 / 1;

    max-width:180px;
    max-height:180px;

    margin:auto;

    border-radius:20px;
    backdrop-filter:blur(12px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
    0 0 20px rgba(0,217,255,0.25),
    inset 0 0 15px rgba(255,255,255,0.05);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-5px);
    }
}

.number{
    font-size:clamp(35px, 10vw, 60px);
    font-weight:bold;
    color:#00e1ff;
    text-shadow:0 0 15px #00e1ff;
}

.label{
    margin-top:5px;
    font-size:clamp(16px, 4vw, 24px);
    color:#fff;
}

.footer{
    margin-top:25px;
    font-size:clamp(14px, 3vw, 18px);
	font-variant-numeric: arabic-indic;
    line-height:1.7;
    color:#ccc;
}

.moon{
    position:fixed;
    font-size:70px;
    opacity:0.15;
    pointer-events:none;
    animation:floatMoon 5s ease-in-out infinite;
}

.moon1{
    top:15px;
    left:15px;
}

.moon2{
    bottom:15px;
    right:15px;
}

@keyframes floatMoon{
    0%,100%{
        transform:translateY(0) rotate(-10deg);
    }

    50%{
        transform:translateY(-15px) rotate(10deg);
    }
}

/* الجوالات الصغيرة جدًا */
@media(max-width:380px){

    body{
        padding:10px;
    }

    .countdown{
        gap:8px;
    }

    .box{
        border-radius:16px;
    }

    .number{
        font-size:34px;
    }

    .label{
        font-size:15px;
    }

    .footer{
        margin-top:18px;
    }
}

/* الشاشات الكبيرة */
@media(min-width:700px){

    .countdown{
        grid-template-columns:repeat(5, 1fr);
        gap:20px;
    }
}
</style>
</head>

<body>

<div class="moon moon1">🌙</div>
<div class="moon moon2">🌙</div>

<div class="container">

    <h1>🌙 العد التنازلي لرمضان ١٤٤٨هـ</h1>

    <div class="sub">
        أهلاً بشهر الصيام والقيام والقرآن 🤲✨
    </div>

    <div class="countdown">

        <div class="box">
            <div class="number" id="months">0</div>
            <div class="label">شهر</div>
        </div>

        <div class="box">
            <div class="number" id="days">0</div>
            <div class="label">يوم</div>
        </div>

        <div class="box">
            <div class="number" id="hours">0</div>
            <div class="label">ساعة</div>
        </div>

        <div class="box">
            <div class="number" id="minutes">0</div>
            <div class="label">دقيقة</div>
        </div>

        <div class="box">
            <div class="number" id="seconds">0</div>
            <div class="label">ثانية</div>
        </div>

    </div>

    <div class="footer">
    بداية رمضان ١٤٤٨هـ : ٨ فبراير ٢٠٢٧م
</div>

</div>

<script>

function toArabicNumbers(number){
    return number.toString().replace(/\d/g, function(digit){
        return "٠١٢٣٤٥٦٧٨٩"[digit];
    });
}
// بداية رمضان 1448هـ
// التاريخ المتوقع حسب تقويم أم القرى
const targetDate = new Date("February 8, 2027 00:00:00").getTime();

function updateCountdown(){

    const now = new Date().getTime();
    const diff = targetDate - now;

    if(diff <= 0){

        document.querySelector(".container").innerHTML = `
            <h1>🌙 رمضان 1448هـ مبارك 🌙</h1>
            <div class="sub">
                تقبل الله منا ومنكم الصيام والقيام وصالح الأعمال 🤲
            </div>
        `;

        return;
    }

    const totalSeconds = Math.floor(diff / 1000);

    const months = Math.floor(
        totalSeconds / (30 * 24 * 60 * 60)
    );

    const days = Math.floor(
        (totalSeconds % (30 * 24 * 60 * 60)) /
        (24 * 60 * 60)
    );

    const hours = Math.floor(
        (totalSeconds % (24 * 60 * 60)) /
        (60 * 60)
    );

    const minutes = Math.floor(
        (totalSeconds % (60 * 60)) /
        60
    );

    const seconds = totalSeconds % 60;

    document.getElementById("months").innerText = toArabicNumbers(months);
document.getElementById("days").innerText = toArabicNumbers(days);
document.getElementById("hours").innerText = toArabicNumbers(hours);
document.getElementById("minutes").innerText = toArabicNumbers(minutes);
document.getElementById("seconds").innerText = toArabicNumbers(seconds);
}

setInterval(updateCountdown, 1000);

updateCountdown();

</script>

</body>
</html>
